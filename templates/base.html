<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ShopSmart{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="navbar">
        <a href="{{ url_for('home') }}" class="logo">ShopSmart</a>
        <form action="{{ url_for('search') }}" method="get" class="search-form">
            <input type="text" name="q" placeholder="Search products..." value="{{ request.args.get('q', '') }}">
            <button type="submit">Search</button>
        </form>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>E-Commerce Recommendation System — Group Project</p>
    </footer>
</body>
</html>
